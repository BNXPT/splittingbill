# PostgreSQL + PgAdmin4 สำหรับ bill-splitter
# ใช้: docker compose up -d   แล้วเปิด PgAdmin ที่ http://localhost:5050
services:
  postgres:
    image: postgres:16-alpine
    container_name: billsplit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-billsplit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billsplit}
      POSTGRES_DB: ${POSTGRES_DB:-billsplit}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billsplit} -d ${POSTGRES_DB:-billsplit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: billsplit-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      # ปิด server-mode = ไม่ต้องล็อกอินซ้ำ, เปิดมาใช้ได้เลย
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin:/var/lib/pgadmin
      # โหลด connection ไปยัง postgres ให้อัตโนมัติ (ไม่ต้องเพิ่มเซิร์ฟเวอร์เอง)
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

volumes:
  pgdata:
  pgadmin:
